<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}TNFCDataInjector — Abyssiaelle{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/htmx.min.js"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📜</text></svg>">
</head>
<body>
    <header class="topbar">
        <div class="brand">
            <span class="sigil">📜</span>
            <div>
                <div class="brand-title">Journal d'Abyssiaelle</div>
                <div class="brand-sub">TNFCDataInjector</div>
            </div>
        </div>
        <nav class="nav">
            <a href="/inject" class="{{ 'on' if active == 'inject' }}">Injecter</a>
            <a href="/history" class="{{ 'on' if active == 'history' }}">Historique</a>
            <a href="/settings" class="{{ 'on' if active == 'settings' }}">Paramètres</a>
        </nav>
    </header>
    <main class="content">
        {% block content %}{% endblock %}
    </main>
    <footer class="foot">Projet Abyssiaelle — outil local d'injection narrative</footer>
</body>
</html>
