# Déploiement de TNFCDataInjector sur le serveur Docker « hiatus » (derrière Traefik).
#
# - Le dossier TakeNotes du partage « auditus » est monté sur l'HÔTE via /etc/fstab
#   (mount.cifs + fichier de credentials, déjà éprouvé) à /mnt/TakeNotes. Le
#   conteneur le BIND-MONTE : Docker ne gère pas le CIFS lui-même.
#   -> évite l'écueil « credentials= inconnu du syscall mount » du driver local.
# - La base d'archivage SQLite vit dans un volume Docker nommé (persistant).
# - L'exposition HTTP est assurée par Traefik via le réseau externe `proxy` :
#   pas de port publié directement sur l'hôte.
#
# Un seul fichier d'environnement (voir les .example à côté) :
#   - .env      : lu par Docker Compose pour l'interpolation ${APP_HOST} du label
#                 Traefik. NE PAS versionner.
#   - app.env   : configuration de l'APPLICATION (chemins Linux sous /mnt/TakeNotes),
#                 injectée dans le conteneur via env_file.
#
# Prérequis sur l'hôte hiatus :
#   - le dossier TakeNotes monté à /mnt/TakeNotes via /etc/fstab (voir DEPLOYMENT.md) ;
#   - le réseau Docker externe `proxy` (partagé avec Traefik).

services:
  tnfc:
    build:
      context: ..
      dockerfile: Dockerfile
    image: loreplexum-injector:latest
    container_name: loreplexum-injector
    restart: unless-stopped
    env_file:
      - app.env
    volumes:
      # Bind-mount du montage CIFS géré par l'hôte (fstab). Doit être monté AVANT
      # le démarrage du conteneur (les entrées fstab `_netdev` le sont au boot).
      - /mnt/TakeNotes:/mnt/TakeNotes
      - tnfc-data:/data
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.loreplexum.rule=Host(`${APP_HOST}`)
      - traefik.http.routers.loreplexum.entrypoints=web
      - traefik.http.services.loreplexum.loadbalancer.server.port=8000

networks:
  # Réseau partagé avec Traefik, créé hors de ce compose.
  proxy:
    external: true

volumes:
  # Base SQLite (historique + anti-doublon) : persistée hors de l'image.
  tnfc-data:
    driver: local
