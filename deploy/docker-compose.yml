# Déploiement de TNFCDataInjector sur le serveur Docker « hiatus » (derrière Traefik).
#
# - L'app tourne dans le conteneur et écrit sur le partage SMB « auditus », monté
#   en CIFS dans le volume `auditus` (-> /mnt/auditus dans le conteneur).
# - La base d'archivage SQLite vit dans un volume Docker nommé (persistant).
# - L'exposition HTTP est assurée par Traefik via le réseau externe `proxy` :
#   pas de port publié directement sur l'hôte.
#
# Deux fichiers d'environnement (voir les .example à côté) :
#   - .env      : lu automatiquement par Docker Compose pour l'interpolation
#                 ${...} ci-dessous (identifiants SMB, hôte, partage, APP_HOST).
#                 NE PAS versionner (secrets).
#   - app.env   : configuration de l'APPLICATION (chemins Linux vers /mnt/auditus),
#                 injectée dans le conteneur via env_file.
#
# Prérequis sur l'hôte hiatus : module noyau CIFS (paquet cifs-utils) et le
# réseau Docker externe `proxy` déjà créé (partagé avec Traefik).

services:
  tnfc:
    build:
      context: ..
      dockerfile: Dockerfile
    image: loreplexum-injector:latest
    container_name: loreplexum-injector
    restart: unless-stopped
    env_file:
      - app.env
    volumes:
      - auditus:/mnt/TakeNotes
      - tnfc-data:/data
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.loreplexum.rule=Host(`${APP_HOST}`)
      - traefik.http.routers.loreplexum.entrypoints=web
      - traefik.http.services.loreplexum.loadbalancer.server.port=8000

networks:
  # Réseau partagé avec Traefik, créé hors de ce compose.
  proxy:
    external: true

volumes:
  # Partage SMB auditus monté directement par Docker (driver local + CIFS).
  auditus:
    driver: local
    driver_opts:
      type: cifs
      o: "username=${SMB_USER},password=${SMB_PASSWORD},uid=1000,gid=1000,vers=3.0,file_mode=0664,dir_mode=0775,iocharset=utf8"
      device: "//${SMB_HOST}/${SMB_SHARE}"

  # Base SQLite (historique + anti-doublon) : persistée hors de l'image.
  tnfc-data:
    driver: local
